<!doctype html>
<html>
  <head>
    <title>Console Demo</title>
  </head>
  <body>
    <script>
      // General info
      console.log("Step 1: Starting product initialization...");

      // Warning (non-critical issue)
      const productsGridEl = document.querySelector(".js-products-grid");
      if (!productsGridEl) {
        console.warn("Products grid not found, skipping initialization.");
      }

      // Error (critical failure)
      try {
        throw new Error("Network request failed!");
      } catch (err) {
        console.error("Step 3: Critical error occurred:", err);
      }
    </script>
  </body>
</html>
